# Frieren Theme - Hyprlock

background {
    path = ~/.config/omarchy/current/backgrounds/current
    blur_passes = 2
    blur_size = 6
    brightness = 0.8
}

input-field {
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(2b4e55)
    inner_color = rgb(e3eadf)
    font_color = rgb(1d2837)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    check_color = rgb(4b775e)
    fail_color = rgb(395857)
    fail_text = <i>incorrect</i>
    position = 0, -80
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(e3eadf)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size = 4
    position = 0, 160
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgb(d4ddd0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
